kind = "web"
previewPath = "/"
title = "SaiRag Engineering LLP"
version = "1.0.0"
id = "artifacts/sairag-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22060

[services.development]
run = "pnpm --filter @workspace/sairag-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sairag-website", "run", "build" ]
publicDir = "artifacts/sairag-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22060"
BASE_PATH = "/"
